<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ambarawa Capital Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root { --up:#16a34a; --down:#dc2626; --flat:#6b7280; --warn:#f59e0b; --bg:#0f172a; --card:#1e293b; --txt:#e2e8f0; --muted:#94a3b8; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  .wrap { max-width:1100px; margin:0 auto; padding:24px 16px 60px; }
  h1 { font-size:1.25rem; margin:0 0 4px; font-weight:600; }
  .sub { color:var(--muted); font-size:0.85rem; margin-bottom:18px; }
  .controls { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:16px; }
  .seg { display:inline-flex; background:var(--card); border-radius:8px; overflow:hidden; border:1px solid #334155; }
  .seg button { background:transparent; color:var(--muted); border:0; padding:8px 14px; cursor:pointer; font-size:0.85rem; }
  .seg button.active { background:#334155; color:var(--txt); }
  select, .seg button { font-family:inherit; }
  select { background:var(--card); color:var(--txt); border:1px solid #334155; border-radius:8px; padding:8px 10px; font-size:0.85rem; }
  .card { background:var(--card); border:1px solid #334155; border-radius:12px; padding:18px 20px; }
  .headline { display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; margin-bottom:14px; }
  .big { font-size:2rem; font-weight:700; }
  .usd { font-size:1.05rem; color:var(--muted); }
  .up { color:var(--up); } .down { color:var(--down); } .flat { color:var(--flat); } .warn { color:var(--warn); }
  .chartbox { position:relative; height:420px; }
  .empty { text-align:center; color:var(--muted); padding:60px 0; }
  .legend { color:var(--muted); font-size:0.8rem; margin-top:10px; }
  .stats-row { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:16px; }
  .stat-card { background:var(--card); border:1px solid #334155; border-radius:12px; padding:14px 16px; }
  .stat-label { color:var(--muted); font-size:0.72rem; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px; }
  .stat-big { font-size:1.5rem; font-weight:700; }
  .stat-sub { color:var(--muted); font-size:0.8rem; margin-top:4px; }
  .profit-card { padding:0; overflow:hidden; margin-top:16px; }
  .profit-toggle { width:100%; background:transparent; border:0; color:var(--txt); padding:15px 20px; cursor:pointer; font-size:1rem; font-weight:600; display:flex; justify-content:space-between; align-items:center; font-family:inherit; }
  .profit-toggle:hover { background:#243349; }
  .profit-toggle .chevron { color:var(--muted); transition:transform .2s; font-size:0.8rem; }
  .profit-toggle.open .chevron { transform:rotate(90deg); }
  .profit-collapse { max-height:0; overflow:hidden; transition:max-height .25s ease; }
  .profit-collapse.open { max-height:1400px; }
  .profit-head { padding:4px 20px 12px; color:var(--muted); font-size:0.88rem; }
  .profit-scroll { overflow-x:auto; padding:0 20px 8px; }
  .profit-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
  .profit-table th, .profit-table td { padding:7px 8px; text-align:left; white-space:nowrap; border-bottom:1px solid #334155; }
  .profit-table th { color:var(--muted); font-weight:600; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.04em; }
  .profit-table th.r, .profit-table td.r { text-align:right; }
  .profit-table tbody tr:hover { background:#243349; }
  .profit-table tfoot td { font-weight:700; border-top:2px solid #475569; border-bottom:0; padding-top:9px; }
  .pos { color:var(--up); } .neg { color:var(--down); } .td-mute { color:var(--muted); }
  .profit-note { padding:0 20px 14px; color:var(--muted); font-size:0.73rem; line-height:1.4; }
  @media (max-width:640px) { .stats-row { grid-template-columns:repeat(2,1fr); } .profit-table { font-size:0.78rem; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Ambarawa Capital Dashboard</h1>
  <div class="sub" id="subtext">Account equity per hour (USDT)</div>

  <div class="controls">
    <div class="seg" id="rangeSeg">
      <button data-range="today">Today</button>
      <button data-range="7d" class="active">7 Days</button>
      <button data-range="1m">30 Days</button>
      <button data-range="month">Month</button>
      <button data-range="all">All Time</button>
    </div>
    <select id="coinSel"><option value="total">Total Equity</option></select>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <div class="stat-label">Block Success Rate</div>
      <div class="stat-big flat" id="srPct">—</div>
      <div class="stat-sub" id="srSub">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Today</div>
      <div class="stat-big flat" id="todayPct">—</div>
      <div class="stat-sub" id="todaySub">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Monthly</div>
      <div class="stat-big flat" id="monthPct">—</div>
      <div class="stat-sub" id="monthSub">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">All-Time</div>
      <div class="stat-big flat" id="allPct">—</div>
      <div class="stat-sub" id="allSub">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Oldest Active Block</div>
      <div class="stat-big flat" id="obAge">—</div>
      <div class="stat-sub" id="obSub">—</div>
    </div>
  </div>

  <div class="card">
    <div class="headline">
      <span class="big" id="pct">—</span>
      <span class="usd" id="usd">—</span>
      <span class="usd" id="count">—</span>
    </div>
    <div class="chartbox"><canvas id="chart"></canvas></div>
    <div class="legend" id="legend">Loading…</div>
  </div>

  <div class="card profit-card">
    <button class="profit-toggle" id="profitToggle" aria-expanded="false">
      <span>💰 Profit</span>
      <span class="chevron" id="profitChevron">▸</span>
    </button>
    <div class="profit-collapse" id="profitCollapse">
      <div class="profit-head" id="profitHead">💰 Profit — —</div>
      <div class="profit-scroll">
        <table class="profit-table" id="profitTable">
          <thead>
            <tr>
              <th>#</th><th>Coin</th>
              <th class="r">Realized</th><th class="r">Realized %</th>
              <th class="r">Unrealized</th><th class="r">Total</th>
              <th class="r">Sold</th><th class="r">Active</th>
            </tr>
          </thead>
          <tbody id="profitBody"></tbody>
          <tfoot id="profitFoot"></tfoot>
        </table>
      </div>
      <div class="profit-note" id="profitNote"></div>
    </div>
  </div>
</div>

<script>
let chart = null;
let deltas = [];
let state = { range: "7d", coin: "total" };
let profitOpen = false;
const SNAP = window.__SNAPSHOT__ || null;
const RANGE_SUB = {today:"today", "7d":"last 7 days", "1m":"last 30 days", "month":"this month (calendar)", "all":"all time"};

const pctEl = document.getElementById("pct");
const usdEl = document.getElementById("usd");
const cntEl = document.getElementById("count");
const legendEl = document.getElementById("legend");
const subEl = document.getElementById("subtext");

function fmtUsd(v) {
  const sign = v < 0 ? "-" : "+";
  return sign + "$" + Math.abs(v).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtPct(v) { return (v >= 0 ? "+" : "") + v.toFixed(2) + "%"; }

async function fetchJson(url) {
  if (SNAP) {
    if (url === "/api/coins") return { coins: SNAP.coins };
    if (url === "/api/stats") return SNAP.stats;
    if (url.indexOf("/api/equity") === 0) {
      const params = new URLSearchParams(url.split("?")[1] || "");
      const range = params.get("range") || "7d";
      const coin = params.get("coin") || "total";
      const byCoin = SNAP.equity[coin] || SNAP.equity["total"] || {};
      return byCoin[range] || byCoin["7d"] || {
        coin: coin, range: range, points: [], first: null, last: null,
        change_pct: 0, change_usd: 0, direction: "flat", count: 0
      };
    }
    if (url.indexOf("/api/profit") === 0) {
      const params = new URLSearchParams(url.split("?")[1] || "");
      const range = params.get("range") || "7d";
      return (SNAP.profit && SNAP.profit[range]) || {
        range: range, label: range, rankings: [],
        totals: {realized: 0, unrealized: 0, realized_pct: 0, bot_count: 0}
      };
    }
    return {};
  }
  const r = await fetch(url);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function loadCoins() {
  try {
    const d = await fetchJson("/api/coins");
    const sel = document.getElementById("coinSel");
    const cur = state.coin;
    sel.innerHTML = '<option value="total">Total Equity</option>';
    (d.coins || []).forEach(a => {
      const o = document.createElement("option");
      o.value = a; o.textContent = a;
      sel.appendChild(o);
    });
    sel.value = cur;
  } catch (e) { console.warn("coins", e); }
}

function setProfitCard(prefix, data) {
  const pctEl = document.getElementById(prefix + "Pct");
  const subEl = document.getElementById(prefix + "Sub");
  if (data.from == null || data.to == null) {
    pctEl.textContent = "—";
    pctEl.className = "stat-big flat";
    subEl.textContent = "no data";
    return;
  }
  pctEl.textContent = fmtPct(data.pct);
  const dir = data.pct > 0 ? "up" : (data.pct < 0 ? "down" : "flat");
  pctEl.className = "stat-big " + dir;
  subEl.textContent = fmtUsd(data.usd);
}

async function fetchStats() {
  try {
    const d = await fetchJson("/api/stats");
    const sr = d.success_rate;
    const srPct = sr.total_sold > 0 ? sr.pct.toFixed(1) + "%" : "—";
    const srEl = document.getElementById("srPct");
    srEl.textContent = srPct;
    srEl.className = "stat-big " + (sr.pct >= 50 ? "up" : "down");
    document.getElementById("srSub").textContent =
      sr.total_sold > 0 ? sr.profitable + "/" + sr.total_sold + " blocks profitable" : "no sold blocks";
    setProfitCard("today", d.today);
    setProfitCard("month", d.monthly);
    setProfitCard("all", d.all_time);

    const ob = d.oldest_block;
    const obAge = document.getElementById("obAge");
    const obSub = document.getElementById("obSub");
    if (ob.bot_name == null) {
      obAge.textContent = "—";
      obAge.className = "stat-big flat";
      obSub.textContent = "no active blocks";
    } else {
      obAge.textContent = ob.age_days.toFixed(2) + "d";
      const cls = ob.status === "expired" ? "down"
        : ob.status === "expiring_soon" ? "warn" : "up";
      obAge.className = "stat-big " + cls;
      const label = ob.status === "expired" ? "EXPIRED"
        : ob.status === "expiring_soon" ? "Expiring soon" : "Active";
      obSub.textContent = ob.bot_name + " #" + ob.block_id + " · " + label;
    }
  } catch (e) { console.warn("stats", e); }
}

async function render() {
  const d = await fetchJson("/api/equity?range=" + state.range + "&coin=" + encodeURIComponent(state.coin));
  deltas = d.points.map(p => p.delta_pct);
  const color = d.direction === "up" ? "#16a34a" : (d.direction === "down" ? "#dc2626" : "#6b7280");
  pctEl.textContent = d.count > 0 ? fmtPct(d.change_pct) : "—";
  pctEl.className = "big " + d.direction;
  usdEl.textContent = d.count > 0 ? fmtUsd(d.change_usd) : "—";
  usdEl.className = "usd " + d.direction;
  cntEl.textContent = d.count > 0 ? (d.count + " pts · $" + (d.last != null ? d.last.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) : "—")) : "no data";
  const coinLabel = d.coin === "total" ? "Total equity" : d.coin + " value";
  subEl.textContent = coinLabel + " per hour (USDT) · " + (RANGE_SUB[d.range] || d.range);
  legendEl.textContent = d.count > 0
    ? ("First $" + (d.first != null ? d.first.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) : "—")
       + "  →  Last $" + (d.last != null ? d.last.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) : "—"))
    : "No data yet. Wait for the first hourly snapshot.";

  if (chart) { chart.destroy(); chart = null; }
  const ctx = document.getElementById("chart").getContext("2d");
  if (d.count === 0) return;
  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: d.points.map(p => p.label),
      datasets: [{
        data: d.points.map(p => p.value),
        borderColor: color,
        backgroundColor: color + "22",
        fill: true,
        tension: 0.25,
        pointRadius: 2,
        pointHoverRadius: 4,
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const i = ctx.dataIndex;
              const v = ctx.parsed.y;
              const dp = deltas[i];
              const dStr = (dp != null && i > 0) ? "  (Δ" + (dp >= 0 ? "+" : "") + dp.toFixed(2) + "%)" : "";
              return "$" + v.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) + dStr;
            }
          }
        }
      },
      scales: {
        x: { ticks: { maxTicksLimit: 12, color: "#94a3b8" }, grid: { color: "#1e293b" } },
        y: { ticks: { color: "#94a3b8", callback: v => "$" + v }, grid: { color: "#334155" } }
      }
    }
  });
}

function fmtSigned(v, dec) {
  const sign = v < 0 ? "-" : "+";
  return sign + "$" + Math.abs(v).toFixed(dec);
}
function clsSign(v) { return v >= 0 ? "pos" : "neg"; }
function fmtPctSigned(v) { return (v >= 0 ? "+" : "") + v.toFixed(2) + "%"; }

async function fetchProfit(range) {
  const d = await fetchJson("/api/profit?range=" + range);
  renderProfit(d);
}

function renderProfit(d) {
  const head = document.getElementById("profitHead");
  const body = document.getElementById("profitBody");
  const foot = document.getElementById("profitFoot");
  const note = document.getElementById("profitNote");
  head.textContent = "💰 Profit — " + (d.label || d.range || "—");
  if (!d.rankings || d.rankings.length === 0) {
    body.innerHTML = '<tr><td colspan="8" class="td-mute" style="text-align:center;padding:26px">No bots with data</td></tr>';
    foot.innerHTML = "";
    note.textContent = "";
    return;
  }
  body.innerHTML = d.rankings.map(function(r, i) {
    const tot = r.realized + r.unrealized;
    return "<tr>"
      + "<td>" + (i + 1) + "</td>"
      + "<td>" + r.base_asset + "</td>"
      + '<td class="r ' + clsSign(r.realized) + '">' + fmtSigned(r.realized, 4) + "</td>"
      + '<td class="r ' + clsSign(r.pnl_pct) + '">' + fmtPctSigned(r.pnl_pct) + "</td>"
      + '<td class="r ' + clsSign(r.unrealized) + '">' + fmtSigned(r.unrealized, 4) + "</td>"
      + '<td class="r ' + clsSign(tot) + '">' + fmtSigned(tot, 4) + "</td>"
      + '<td class="r">' + r.sold_count + "</td>"
      + '<td class="r">' + r.active_count + "</td>"
      + "</tr>";
  }).join("");
  const t = d.totals;
  const totAll = t.realized + t.unrealized;
  foot.innerHTML = "<tr>"
    + '<td colspan="2">Σ Total</td>'
    + '<td class="r ' + clsSign(t.realized) + '">' + fmtSigned(t.realized, 4) + "</td>"
    + '<td class="r ' + clsSign(t.realized_pct) + '">' + fmtPctSigned(t.realized_pct) + "</td>"
    + '<td class="r ' + clsSign(t.unrealized) + '">' + fmtSigned(t.unrealized, 4) + "</td>"
    + '<td class="r ' + clsSign(totAll) + '">' + fmtSigned(totAll, 4) + "</td>"
    + '<td class="r td-mute" colspan="2">' + t.bot_count + " bots</td>"
    + "</tr>";
  note.textContent = "Realized = sold blocks in period · Unrealized valued at latest hourly snapshot price (up to 1h stale) · Ranked by realized";
}

document.getElementById("profitToggle").addEventListener("click", function() {
  const btn = this;
  const col = document.getElementById("profitCollapse");
  profitOpen = !profitOpen;
  btn.classList.toggle("open", profitOpen);
  btn.setAttribute("aria-expanded", profitOpen ? "true" : "false");
  col.classList.toggle("open", profitOpen);
  if (profitOpen) { fetchProfit(state.range).catch(function(e){ console.error("profit", e); }); }
});

document.getElementById("rangeSeg").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  document.querySelectorAll("#rangeSeg button").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  state.range = b.dataset.range;
  render().catch(err => console.error(err));
  if (profitOpen) { fetchProfit(state.range).catch(function(e){ console.error("profit", e); }); }
});
document.getElementById("coinSel").addEventListener("change", e => {
  state.coin = e.target.value;
  render().catch(err => console.error(err));
});

(async function init() {
  await fetchStats();
  await loadCoins();
  await render();
  if (SNAP) {
    legendEl.textContent += "  ·  📸 snapshot " + (SNAP.generated_at || "");
  } else {
    setInterval(fetchStats, 60000);
  }
})().catch(err => { legendEl.textContent = "Error: " + err; console.error(err); });
</script>
</body>
</html>
